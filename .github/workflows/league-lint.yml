name: League Lint

on:
  push:
    branches: [main]
    paths: ['index.html', 'scripts/league-lint.mjs']
  workflow_dispatch: {}

jobs:
  league-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Validate SPORTS league ids
        run: node scripts/league-lint.mjs
